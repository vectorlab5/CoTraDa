experiment:
  name: "cooperative_traffic_data"
  seed: 42
  output_dir: "experiments"
  scenario: "urban_small"
  episodes: 100
  slots_per_episode: 500

model:
  feature_dim: 128
  alpha: 0.3
  beta_cost: 0.05
  lambda_rho: 0.01
  lambda_pi: 0.01
  lambda_aoi: 0.1
  rho_candidates: [0.0, 0.25, 0.5, 0.75]
  context_momentum: 0.1
  trust_forgetting: 0.05
  dual_step_size: 0.01
  dual_iterations: 10
  max_hops: 5
  threshold_payload_bits: 64.0

policy:
  hidden_dims: [256, 128]
  q_hidden_dims: [128, 64]
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  ppo_epochs: 4
  minibatch_size: 256
  lr: 0.0003
  warmup_episodes: 20

simulator:
  sub6_mhz: 20.0
  mmwave_mhz: 100.0
  base_failure_probability: 0.1
  feature_noise_std: 0.03
  deadline_slots: 5
  rsu_count: 4

evaluation:
  bootstrap_resamples: 1000
  metrics:
    - weighted_aoi
    - data_utility
    - delivery_ratio
    - throughput_mbps
    - avg_latency_ms
    - slot_time_ms
